<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-sm">
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <h2 class="text-gray-800 text-xl font-semibold mb-2">Reset Password</h2>
    <p class="text-gray-500 text-sm mb-6">Enter your email and we will send reset instructions.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm bg-blue-50 text-blue-700 border border-blue-200">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <input type="email" name="email" required placeholder="your@email.com"
             class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm mb-4"/>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">
        Send Reset Link
      </button>
    </form>
    <div class="mt-4 text-center">
      <a href="{{ url_for('auth.login') }}" class="text-gray-500 hover:text-gray-700 text-sm">← Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
