<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — VoucherPlatform</title>
  <script src="{{ url_for('static', filename='tailwind.js') }}"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <h1 class="text-white text-3xl font-bold">🎟 VoucherPlatform</h1>
    <p class="text-blue-300 mt-2 text-sm">B2B Voucher Distribution Portal</p>
  </div>
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <h2 class="text-gray-800 text-xl font-semibold mb-6">Sign In to Your Account</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm {% if category=='danger' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" name="email" required placeholder="you@company.com"
               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all"/>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required placeholder="••••••••"
               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all"/>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">
        Sign In
      </button>
    </form>
    <div class="mt-4 text-center">
      <a href="{{ url_for('auth.forgot_password') }}" class="text-blue-600 hover:underline text-sm">Forgot Password?</a>
    </div>
  </div>
</div>
</body>
</html>
