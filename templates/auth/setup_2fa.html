<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setup 2FA — VoucherPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <h2 class="text-gray-800 text-xl font-semibold mb-2">Setup Two-Factor Authentication</h2>
    <p class="text-gray-500 text-sm mb-6">Scan the QR code below using Google Authenticator or any TOTP app.</p>
    <div class="text-center mb-6">
      <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code" class="mx-auto w-48 h-48 border border-gray-200 rounded-lg"/>
      <p class="text-xs text-gray-500 mt-2">Or enter this code manually:</p>
      <code class="bg-gray-100 px-3 py-1 rounded text-sm font-mono tracking-wider">{{ secret }}</code>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm {% if category=='danger' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <label class="block text-sm font-medium text-gray-700 mb-1">Enter 6-digit code to confirm setup</label>
      <input type="text" name="token" maxlength="6" required placeholder="000000"
             class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-center text-xl tracking-widest font-mono focus:ring-2 focus:ring-blue-500 outline-none mb-4"/>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors">
        Confirm & Activate 2FA
      </button>
    </form>
  </div>
</div>
</body>
</html>
