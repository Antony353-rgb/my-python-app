<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Two-Factor Auth — VoucherPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <h1 class="text-white text-2xl font-bold">🎟 VoucherPlatform</h1>
  </div>
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-3">
        <span class="text-3xl">🔐</span>
      </div>
      <h2 class="text-gray-800 text-xl font-semibold">Two-Factor Authentication</h2>
      <p class="text-gray-500 text-sm mt-1">Enter the 6-digit code from your authenticator app</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-6">
        <input type="text" name="token" maxlength="6" required placeholder="000000" autofocus
               class="w-full px-4 py-3 border border-gray-300 rounded-lg text-center text-2xl tracking-widest font-mono focus:ring-2 focus:ring-blue-500 outline-none"/>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors">
        Verify
      </button>
    </form>
    <div class="mt-4 text-center">
      <a href="{{ url_for('auth.logout') }}" class="text-gray-500 hover:text-gray-700 text-sm">← Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
