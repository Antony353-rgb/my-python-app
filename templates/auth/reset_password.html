<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — VoucherPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-sm">
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <h2 class="text-gray-800 text-xl font-semibold mb-2">Set New Password</h2>
    <p class="text-gray-500 text-sm mb-6">Enter your new password below.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm
          {% if category=='danger' %}bg-red-50 text-red-700 border border-red-200
          {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <input type="hidden" name="token" value="{{ token }}"/>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input type="password" name="new_password" required placeholder="Min 8 chars, uppercase, number, special"
               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"/>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" name="confirm_password" required placeholder="Re-enter new password"
               class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm"/>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm">
        Reset Password
      </button>
    </form>
    <div class="mt-4 text-center">
      <a href="{{ url_for('auth.login') }}" class="text-gray-500 hover:text-gray-700 text-sm">Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
