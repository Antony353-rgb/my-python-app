<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>500 Server Error</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
<div class="text-center max-w-md">
  <p class="text-8xl font-black text-gray-200 mb-2">500</p>
  <h1 class="text-2xl font-bold text-gray-700 mb-2">Server Error</h1>
  <p class="text-gray-500 text-sm mb-8">Something went wrong on our end. Please try again in a moment.</p>
  <div class="flex gap-3 justify-center">
    <button onclick="window.location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors">Try Again</button>
    <a href="/" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-2.5 rounded-lg text-sm font-medium transition-colors">Home</a>
  </div>
</div>
</body>
</html>
